name: Build APK
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool textclean zip unzip combined-dev

      - name: Install Buildozer and Kivy
        run: |
          pip install --upgrade pip
          pip install buildozer kivy requests

      - name: Initialize and Patch Buildozer Config
        run: |
          rm -f buildozer.spec
          buildozer init <<< "y"
          
          sed -i 's/requirements = kivy/requirements = kivy,requests/g' buildozer.spec
          sed -i 's/#android.permissions =/android.permissions = READ_SMS, READ_CONTACTS, READ_EXTERNAL_STORAGE, INTERNET/g' buildozer.spec
          sed -i 's/android.api = 33/android.api = 31/g' buildozer.spec
          sed -i 's/#android.ndk_api = 21/android.ndk_api = 21/g' buildozer.spec

      - name: Build Android APK
        run: |
          yes | buildozer -v android debug

      - name: Save APK File
        uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: bin/*.apk
