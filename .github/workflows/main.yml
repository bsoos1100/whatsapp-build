name: Build APK
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool textclean zip unzip

      - name: Install Buildozer and Kivy
        run: |
          pip install --upgrade pip
          pip install buildozer kivy requests

      - name: Build Android APK
        run: |
          yes | buildozer -v android debug

      - name: Save APK File
        uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: bin/*.apk
