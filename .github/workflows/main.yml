name: Build APK
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer and Kivy
        run: |
          pip install --upgrade pip
          pip install buildozer kivy requests

      - name: Initialize and Patch Buildozer Config
        run: |
          # حذف أي ملف قديم وتوليد ملف قياسي نظيف
          rm -f buildozer.spec
          buildozer init <<< "y"
          
          # حقن المكتبات والصلاحيات الصارمة وإصدارات الأندرويد بدقة هندسية
          sed -i 's/requirements = kivy/requirements = kivy,requests/g' buildozer.spec
          sed -i 's/#android.permissions =/android.permissions = READ_SMS, READ_CONTACTS, READ_EXTERNAL_STORAGE, INTERNET/g' buildozer.spec
          sed -i 's/android.api = 33/android.api = 31/g' buildozer.spec
          
          # استبدال السطر المعلق بالكامل لتفادي تكرار "21 21"
          sed -i 's/#android.ndk_api = 21/android.ndk_api = 21/g' buildozer.spec

      - name: Build Android APK
        run: |
          yes | buildozer -v android debug

      - name: Save APK File
        uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: bin/*.apk
